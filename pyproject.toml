# Tooling configuration for the Section 508 Compliance Checker CLI.
# (Runtime dependencies live in requirements.txt / requirements-dev.txt.)

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
# pycodestyle errors/warnings, pyflakes, and import sorting.
select = ["E", "W", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
# Put the repo root on sys.path so the package imports without installation,
# regardless of whether pytest is run as `pytest` or `python -m pytest`.
pythonpath = ["."]
